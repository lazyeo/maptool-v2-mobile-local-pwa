<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f3efe8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Zone Planner — Rolleston</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M16 2C9.37 2 4 7.37 4 14c0 9.5 12 16 12 16s12-6.5 12-16C28 7.37 22.63 2 16 2z' fill='%232e2117'/%3E%3Ccircle cx='16' cy='14' r='5' fill='%23fffaf3'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Map (full viewport background) -->
<div id="map"></div>

<!-- Top search bar (always visible) -->
<div id="search-bar">
  <button id="btn-sidebar-toggle" aria-label="Toggle zones panel" title="Zones">
    <svg width="18" height="14" viewBox="0 0 18 14" fill="none" aria-hidden="true">
      <path d="M0 1h18M0 7h18M0 13h18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
  </button>
  <div id="search-wrapper">
    <span id="search-icon">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M10 10L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </span>
    <input type="text" id="search-input" placeholder="Search address in Rolleston…" autocomplete="off" enterkeyhint="search">
    <button id="btn-camera" aria-label="Scan address with camera">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        <circle cx="12" cy="13" r="4" stroke="currentColor" stroke-width="1.8"/>
      </svg>
    </button>
    <button id="search-clear" aria-label="Clear search">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>
    <div id="autocomplete-list"></div>
  </div>

</div>

<!-- Zone result banner -->
<div id="zone-result-banner"></div>

<!-- Offline indicator -->
<div id="offline-indicator">Offline</div>

<!-- Floating action buttons -->
<div id="fab-container">
  <button class="fab fab-finish" id="fab-finish" aria-label="Finish drawing" title="Finish polygon">Finish</button>
  <button class="fab" id="fab-draw" aria-label="Draw zone" title="Draw a new zone">Draw Zone</button>
  <button class="fab fab-edit-btn" id="fab-edit" aria-label="Edit zones" title="Edit zones">Edit</button>
</div>

<!-- Desktop sidebar -->
<aside id="sidebar">
  <div id="sidebar-header">
    <h1>Zone Planner</h1>
    <button id="sidebar-close" aria-label="Close sidebar">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <div id="sidebar-content">
    <div class="section-header">
      <h2>Zones</h2>
      <span class="section-badge" id="zone-count-desktop">0</span>
    </div>
    <div id="zone-list-desktop"></div>
  </div>
  <div id="sidebar-footer">
    <button class="btn" id="btn-export">Export</button>
    <button class="btn" id="btn-import">Import</button>
    <button class="btn btn-danger" id="btn-clear">Clear All</button>
  </div>
</aside>

<!-- Mobile bottom drawer -->
<div id="drawer">
  <div id="drawer-handle"><div id="drawer-handle-bar"></div></div>
  <div id="drawer-peek">
    <span>Zones <span class="section-badge" id="zone-count-mobile">0</span></span>
    <button class="btn btn-sm" id="btn-export-mobile">Export</button>
  </div>
  <div id="drawer-content">
    <div id="zone-list-mobile"></div>
    <div class="drawer-footer-actions">
      <button class="btn" id="btn-import-mobile">Import</button>
      <button class="btn btn-danger" id="btn-clear-mobile">Clear All</button>
    </div>
  </div>
</div>

<!-- Modal overlay for creating a new zone -->
<div id="modal-overlay">
  <div id="modal">
    <h3>Name this zone</h3>
    <p>Give your new zone a name and pick a colour.</p>
    <div class="form-field">
      <label class="field-label-text" for="modal-input">Zone name</label>
      <input type="text" id="modal-input" placeholder="e.g. Rolleston North" enterkeyhint="done">
    </div>
    <div class="form-field">
      <label class="field-label-text" for="modal-notes">Notes</label>
      <textarea id="modal-notes" rows="3" placeholder="Optional notes about this zone…"></textarea>
    </div>
    <div class="form-field">
      <label class="field-label-text">Colour</label>
      <div id="modal-color-swatches" class="color-swatches"></div>
    </div>
    <div id="modal-actions">
      <button id="modal-cancel" class="btn">Cancel</button>
      <button id="modal-confirm" class="btn btn-primary">Save Zone</button>
    </div>
  </div>
</div>

<!-- Edit sheet overlay -->
<div id="edit-sheet-overlay">
  <div id="edit-sheet">
    <h3>Edit zone</h3>
    <div class="form-field">
      <label class="field-label-text" for="edit-name-input">Zone name</label>
      <input type="text" id="edit-name-input" placeholder="Zone name" enterkeyhint="done">
    </div>
    <div class="form-field">
      <label class="field-label-text" for="edit-notes-input">Notes</label>
      <textarea id="edit-notes-input" rows="3" placeholder="Optional notes about this zone…"></textarea>
    </div>
    <div class="form-field">
      <label class="field-label-text">Colour</label>
      <div id="edit-color-swatches" class="color-swatches"></div>
    </div>
    <div id="edit-sheet-actions">
      <button id="edit-sheet-cancel" class="btn">Cancel</button>
      <button id="edit-sheet-confirm" class="btn btn-primary">Save Changes</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Address card -->
<div id="address-card" style="display:none">
  <div id="address-card-inner">
    <div id="address-card-text"></div>
    <div id="address-card-zone-row">
      <span id="address-card-zone-dot" class="zone-dot"></span>
      <span id="address-card-zone-name"></span>
    </div>
    <div id="address-card-select-row" style="display:none">
      <label>Move to zone:</label>
      <select id="address-card-zone-select"></select>
    </div>
    <div id="address-card-actions">
      <button class="btn btn-sm" id="btn-card-change-zone">Change Zone</button>
      <button class="btn btn-sm btn-primary" id="btn-card-add">Add to Zone</button>
      <button class="btn btn-sm" id="btn-card-dismiss">Dismiss</button>
    </div>
  </div>
</div>

<!-- Camera overlay -->
<div id="camera-overlay">
  <div id="camera-panel">
    <div id="camera-header">
      <span>Scan address</span>
      <button id="camera-close">×</button>
    </div>
    <div id="camera-viewfinder">
      <video id="camera-video" playsinline autoplay muted></video>
      <canvas id="camera-canvas" style="display:none"></canvas>
    </div>
    <div id="camera-hint">Point camera at a letterbox, street sign, or address label</div>
    <div id="camera-actions">
      <button class="btn" id="btn-capture">Capture</button>
      <label class="btn" id="btn-gallery-label">
        Choose from Gallery
        <input type="file" id="btn-gallery" accept="image/*" capture="environment" style="display:none">
      </label>
    </div>
    <div id="ocr-status" style="display:none"></div>
    <!-- OCR token selection panel -->
    <div id="ocr-result-panel" style="display:none">
      <div id="ocr-result-label">Tap lines to select — combine if needed</div>
      <div id="ocr-token-area"></div>
      <div id="ocr-preview-row">
        <span id="ocr-preview-text"></span>
        <button id="ocr-clear-btn" title="Clear selection">✕</button>
      </div>
      <button id="ocr-confirm-btn" class="btn" disabled>Use this address</button>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.3/Sortable.min.js"></script>
<script src="app.js"></script>
</body>
</html>
